<span style={{ fontSize: 10, color: "#94a3b8", padding: "4px 0" }}>{cases.length} case{cases.length !== 1 ? "s" : ""}</span>
{cases.length > 0 && <button onClick={exportCases} style={{ padding: "4px 10px", background: "#4ade8020", border: "1px solid #4ade8040", borderRadius: 6, color: "#4ade80", fontSize: 9, fontWeight: 600, cursor: "pointer" }}>{"📥 CSV"}</button>}
{cases.length > 0 && <button onClick={exportJSON} style={{ padding: "4px 10px", background: "#38bdf820", border: "1px solid #38bdf840", borderRadius: 6, color: "#38bdf8", fontSize: 9, fontWeight: 600, cursor: "pointer" }}>{"📥 JSON"}</button>}
</div>
</div>
<div style={{ background: c.cd, borderRadius: 10, padding: 12, border: "1px solid #334155", marginBottom: 12 }}>
<div style={{ fontSize: 10, fontWeight: 700, color: c.a, marginBottom: 8 }}>{caseLogEdit ? "Edit Case" : "Log New Case"}</div>
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
<div>
<label style={{ fontSize: 8, color: "#64748b" }}>Date</label>
<input type="date" value={caseLogForm.date} onChange={function(e) { setCaseLogForm(function(p) { return Object.assign({}, p, { date: e.target.value }); }); }} style={{ width: "100%", padding: "6px 8px", background: "#0f172a", border: "1px solid #334155", borderRadius: 6, color: "#e2e8f0", fontSize: 10, boxSizing: "border-box" }} />
</div>
<div>
<label style={{ fontSize: 8, color: "#64748b" }}>Role</label>
<select value={caseLogForm.role} onChange={function(e) { setCaseLogForm(function(p) { return Object.assign({}, p, { role: e.target.value }); }); }} style={{ width: "100%", padding: "6px 8px", background: "#0f172a", border: "1px solid #334155", borderRadius: 6, color: "#e2e8f0", fontSize: 10, boxSizing: "border-box" }}>
{ROLES.map(function(r) { return <option key={r} value={r}>{r}</option>; })}
</select>
</div>
</div>
<div style={{ marginBottom: 6 }}>
<label style={{ fontSize: 8, color: "#64748b" }}>Procedure</label>
<select value={COMMON_PROCS.indexOf(caseLogForm.procedure) >= 0 ? caseLogForm.procedure : "Other"} onChange={function(e) { setCaseLogForm(function(p) { return Object.assign({}, p, { procedure: e.target.value === "Other" ? "" : e.target.value }); }); }} style={{ width: "100%", padding: "6px 8px", background: "#0f172a", border: "1px solid #334155", borderRadius: 6, color: "#e2e8f0", fontSize: 10, marginBottom: 4, boxSizing: "border-box" }}>
<option value="">Select procedure...</option>
{COMMON_PROCS.map(function(p) { return <option key={p} value={p}>{p}</option>; })}
</select>
{(COMMON_PROCS.indexOf(caseLogForm.procedure) < 0) && (
<input value={caseLogForm.procedure} onChange={function(e) { setCaseLogForm(function(p) { return Object.assign({}, p, { procedure: e.target.value }); }); }} placeholder="Type procedure name..." style={{ width: "100%", padding: "6px 8px", background: "#0f172a", border: "1px solid #334155", borderRadius: 6, color: "#e2e8f0", fontSize: 10, boxSizing: "border-box" }} />
)}
</div>
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
<div>
<label style={{ fontSize: 8, color: "#64748b" }}>Attending</label>
<input value={caseLogForm.attending} onChange={function(e) { setCaseLogForm(function(p) { return Object.assign({}, p, { attending: e.target.value }); }); }} placeholder="Dr. Smith" style={{ width: "100%", padding: "6px 8px", background: "#0f172a", border: "1px solid #334155", borderRadius: 6, color: "#e2e8f0", fontSize: 10, boxSizing: "border-box" }} />
</div>
<div>
<label style={{ fontSize: 8, color: "#64748b" }}>Tags</label>

</div>
</div>
<div style={{ marginBottom: 8 }}>
<label style={{ fontSize: 8, color: "#64748b" }}>Notes</label>

</div>
<div style={{ display: "flex", gap: 6 }}>
<button onClick={saveCase} style={{ flex: 1, padding: "8px 0", background: "linear-gradient(135deg, " + c.a + ", " + c.a2 + ")", border: "none", borderRadius: 8, color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{caseLogEdit ? "Update" : "Log Case"}</button>
{caseLogEdit && <button onClick={function() { setCaseLogEdit(null); setCaseLogForm({ date: new Date().toISOString().slice(0,10), procedure: "", role: "Observer", attending: "", notes: "", tags: "" }); }} style={{ padding: "8px 12px", background: "transparent", border: "1px solid #64748b", borderRadius: 8, color: "#64748b", fontSize: 11, cursor: "pointer" }}>Cancel</button>}
</div>
</div>
{cases.length > 3 && (
<input value={caseLogFilter} onChange={function(e) { setCaseLogFilter(e.target.value); }} placeholder="Search cases..." style={{ width: "100%", padding: "8px 12px", background: c.cd, border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", fontSize: 10, marginBottom: 10, boxSizing: "border-box" }} />
)}
<div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
{sorted.map(function(cs) {
var roleCol = cs.role === "Primary Surgeon" ? "#4ade80" : cs.role === "First Assist" ? "#38bdf8" : cs.role === "Consult" ? "#f59e0b" : cs.role === "Clinic" ? "#a78bfa" : "#64748b";

<div key={cs.id} style={{ background: c.cd, borderRadius: 8, padding: "10px 12px", border: "1px solid #334155", borderLeft: "3px solid " + roleCol }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
<div>
<div style={{ fontSize: 11, fontWeight: 700, color: "#e2e8f0" }}>{cs.procedure}</div>
<div style={{ fontSize: 9, color: "#64748b", marginTop: 2 }}>{cs.date} · <span style={{ color: roleCol }}>{cs.role}</span>{cs.attending ? " · " + cs.attending : ""}</div>
</div>
<div style={{ display: "flex", gap: 4 }}>
<button onClick={function() { copyCase(cs); }} style={{ background: "none", border: "none", color: "#64748b", fontSize: 10, cursor: "pointer", padding: 2 }} title="Copy for ACGME">{"📋"}</button>

<button onClick={function() { deleteCase(cs.id); }} style={{ background: "none", border: "none", color: "#64748b", fontSize: 10, cursor: "pointer", padding: 2 }}>{"🗑"}</button>
</div>
</div>
{cs.tags && <div style={{ fontSize: 8, color: c.a, marginBottom: 2 }}>{cs.tags.split(",").map(function(t) { return t.trim(); }).filter(Boolean).map(function(t, ti) { return <span key={ti} style={{ display: "inline-block", padding: "1px 5px", background: c.a + "15", border: "1px solid " + c.a + "30", borderRadius: 3, marginRight: 3, marginBottom: 2 }}>{t}</span>; })}</div>}
{cs.notes && <div style={{ fontSize: 9, color: "#94a3b8", lineHeight: 1.5, marginTop: 3 }}>{cs.notes}</div>}
</div>
);
})}
</div>
{cases.length === 0 && <div style={{ textAlign: "center", padding: 24, color: "#475569" }}><div style={{ fontSize: 28, marginBottom: 6 }}>{"📝"}</div><div style={{ fontSize: 11 }}>No cases logged yet. Start tracking your procedures above!</div></div>}
{cases.length > 0 && (function() {
var procCounts = {};
var roleCounts = {};
cases.forEach(function(c2) { procCounts[c2.procedure] = (procCounts[c2.procedure] || 0) + 1; roleCounts[c2.role] = (roleCounts[c2.role] || 0) + 1; });
var topProcs = Object.keys(procCounts).sort(function(a, b) { return procCounts[b] - procCounts[a]; }).slice(0, 5);

<div style={{ fontSize: 10, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>{"📊 Summary"}</div>
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
<div>
<div style={{ fontSize: 8, color: "#64748b", marginBottom: 4 }}>Top Procedures</div>
{topProcs.map(function(p) { return <div key={p} style={{ fontSize: 9, color: "#94a3b8", marginBottom: 2 }}>{p}: <span style={{ color: c.a, fontWeight: 700 }}>{procCounts[p]}</span></div>; })}
</div>
<div>
<div style={{ fontSize: 8, color: "#64748b", marginBottom: 4 }}>By Role</div>
{Object.keys(roleCounts).map(function(r) { return <div key={r} style={{ fontSize: 9, color: "#94a3b8", marginBottom: 2 }}>{r}: <span style={{ color: c.a, fontWeight: 700 }}>{roleCounts[r]}</span></div>; })}

</div>
</div>
);
})()}
</div>

})()}

procedure_name: cs.procedure_name || "",
date: cs.date || "",

attending: cs.attending || "",
hospital: cs.hospital || "",
approach: cs.approach || "",
laterality: cs.laterality || "N/A",
patient_age: "",
patient_sex: "",
is_pediatric: false,
cpt_codes: [],
notes: cs.notes || ""
};
try {
chrome.runtime.sendMessage(extId, { type: "surgilog-push-case", case: surgiCase }, function(response) {
if (chrome.runtime.lastError) {
navigator.clipboard.writeText(buildDictation(cs)).then(function() {
alert("Couldn't reach SurgiLog.\nCase copied as dictation — paste into SurgiLog side panel to parse CPT codes.");
});
return;
}
if (response && response.ok) {
alert("Case added to SurgiLog! Open the side panel and tap Log to parse CPT codes and fill ACGME.");
} else { alert("SurgiLog error. Check extension ID."); }
});
} catch(err) {
navigator.clipboard.writeText(buildDictation(cs)).then(function() {
alert("Chrome messaging not available.\nCase copied as dictation — paste into SurgiLog.");
});
}

pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
var reader = new FileReader();
reader.onload = function(evt) {
setConvertingChat("Extracting text from PDF...");
var arr = new Uint8Array(evt.target.result);
pdfjsLib.getDocument({ data: arr }).promise.then(function(pdf) {
var pages = [];
var total = pdf.numPages;
function extractPage(n) {
if (n > total) {
finishUpload("# " + fname.replace(/\.[^.]+$/, "") + "\n\n" + pages.join("\n\n---\n\n"));
return;
}
setConvertingChat("Extracting page " + n + " of " + total + "...");
pdf.getPage(n).then(function(page) {
page.getTextContent().then(function(tc) {

text = text.replace(/\s{2,}/g, " ").trim();
if (text) pages.push("## Page " + n + "\n\n" + text);
extractPage(n + 1);
});
});

reader.readAsArrayBuffer(file);
};
script2.onerror = function() { setConvertingChat(""); };
document.head.appendChild(script2);

<div style={{ fontSize: 9, color: "#64748b", marginBottom: 12 }}>AUA/SUFU Microhematuria Guidelines (2025 Update)</div>
<div style={{ display: "flex", flexDirection: "column", gap: 14, fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>
<div>
<div style={{ fontWeight: 600, color: "#ef4444" }}>Definition</div>
<div>• Microscopic hematuria (MH): ≥3 RBCs/HPF on a properly collected UA with microscopy</div>
<div>• Must be non-contaminated specimen (midstream clean catch or cath)</div>
<div style={{ fontWeight: 700, color: "#fbbf24", marginTop: 2 }}>• Dipstick alone is NOT sufficient — must confirm with microscopy</div>
<div style={{ marginTop: 4, color: "#94a3b8", fontSize: 10 }}>Gross hematuria: ANY episode in an adult = full workup (CTU + cysto), skip risk stratification</div>

<div>
<div style={{ fontWeight: 600, color: "#ef4444" }}>Before Risk Stratifying</div>
<div>• Rule out benign/transient causes first:</div>
<div style={{ paddingLeft: 12 }}>— Menstruation, vigorous exercise, sexual activity, UTI (treat &amp; recheck), viral illness</div>
<div>• If MH only during benign cause → repeat UA after resolution</div>

<div style={{ marginTop: 4, padding: "4px 8px", background: "#fbbf2415", border: "1px solid #fbbf2430", borderRadius: 5, color: "#fbbf24", fontWeight: 600, fontSize: 10 }}>{"⚠️"} Anticoagulants/antiplatelets: same workup regardless — AC reveals pathology, doesn't cause it</div>

<div>• Chronic indwelling foreign body (catheter, ureteral stent)</div>

<div style={{ fontWeight: 600, color: "#ef4444", marginBottom: 6 }}>2025 AUA Risk Stratification</div>
<div style={{ background: "#4ade8010", border: "1px solid #4ade8030", borderRadius: 6, padding: "8px 10px", marginBottom: 6 }}>
<div style={{ fontWeight: 700, color: "#4ade80", marginBottom: 4 }}>LOW / NEGLIGIBLE RISK — Repeat UA in 6 months</div>
<div style={{ fontSize: 11, fontWeight: 600 }}>ALL of the following must be present:</div>
<div style={{ fontSize: 11 }}>• Women &lt;60 or Men &lt;40</div>
<div style={{ fontSize: 11 }}>• Never smoker OR &lt;10 pack-years</div>
<div style={{ fontSize: 11 }}>• 3-10 RBCs/HPF on a single UA</div>
<div style={{ fontSize: 11 }}>• No additional risk factors (see list above)</div>
<div style={{ fontSize: 10, color: "#4ade80", fontWeight: 600, marginTop: 4 }}>→ No cystoscopy, no imaging. Repeat UA in 6 months.</div>
<div style={{ fontSize: 10, color: "#4ade80" }}>→ If persistent (3-25 RBC/HPF on repeat) → reclassify as intermediate</div>
</div>
<div style={{ background: "#fbbf2410", border: "1px solid #fbbf2430", borderRadius: 6, padding: "8px 10px", marginBottom: 6 }}>
<div style={{ fontWeight: 700, color: "#fbbf24", marginBottom: 4 }}>INTERMEDIATE RISK — Cystoscopy + Renal US</div>
<div style={{ fontSize: 11, fontWeight: 600 }}>ANY ONE of the following:</div>
<div style={{ fontSize: 11 }}>• Women ≥60 or Men 40-59</div>
<div style={{ fontSize: 11 }}>• 10-30 pack-year smoking history</div>
<div style={{ fontSize: 11 }}>• 11-25 RBCs/HPF</div>
<div style={{ fontSize: 11 }}>• 1 or more additional risk factors</div>
<div style={{ fontSize: 11 }}>• Previously low/negligible with 3-25 RBC/HPF on repeat UA</div>
<div style={{ fontSize: 10, color: "#fbbf24", fontWeight: 600, marginTop: 4 }}>→ Cystoscopy + renal ultrasound</div>
<div style={{ fontSize: 10, color: "#fbbf24" }}>→ May offer urine-based tumor markers (UBTMs) — if negative, patient may defer cysto with repeat UA at 12mo</div>
<div style={{ fontSize: 10, color: "#fbbf24" }}>→ May offer urine cytology as adjunct</div>
</div>
<div style={{ background: "#ef444410", border: "1px solid #ef444430", borderRadius: 6, padding: "8px 10px" }}>
<div style={{ fontWeight: 700, color: "#ef4444", marginBottom: 4 }}>HIGH RISK — Cystoscopy + CT Urogram</div>
<div style={{ fontSize: 11, fontWeight: 600 }}>ANY ONE of the following:</div>
<div style={{ fontSize: 11 }}>• Men ≥60</div>
<div style={{ fontSize: 11, fontWeight: 700, color: "#fbbf24" }}>• Women should NOT be classified high-risk by age alone</div>
<div style={{ fontSize: 11 }}>• &gt;30 pack-year smoking history</div>

<div style={{ fontSize: 11 }}>• History of gross hematuria (even single episode)</div>

<div style={{ fontSize: 10, color: "#ef4444" }}>→ CT urogram preferred; MR urogram if CT contraindicated</div>
<div style={{ fontSize: 10, color: "#ef4444" }}>→ If both contraindicated: retrograde pyelogram + non-con CT or renal US</div>
</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#ef4444" }}>Urine-Based Tumor Markers (UBTMs)</div>
<div style={{ fontSize: 11 }}>• Only for INTERMEDIATE risk patients who wish to avoid cystoscopy</div>
<div style={{ fontSize: 11 }}>• NOT recommended for low/negligible or high risk</div>
<div style={{ fontSize: 11 }}>• If UBTM negative → may defer cysto, repeat UA in 12 months</div>
<div style={{ fontSize: 11 }}>• If UBTM positive → proceed with cystoscopy</div>
<div style={{ fontSize: 11 }}>• Examples: UroVysion FISH, NMP22, Cxbladder, etc.</div>

<div style={{ color: "#4ade80" }}>Low</div><div>No</div><div>No</div><div>Repeat UA 6mo</div>
<div style={{ color: "#fbbf24" }}>Intermediate</div><div>Yes*</div><div>Renal US</div><div>Repeat UA 12mo</div>
<div style={{ color: "#ef4444" }}>High</div><div>Yes</div><div>CT Urogram</div><div>Per findings</div>
<div style={{ color: "#ef4444" }}>Gross</div><div>Yes</div><div>CT Urogram</div><div>Per findings</div>
</div>
<div style={{ fontSize: 9, color: "#94a3b8", marginTop: 2 }}>*Intermediate: may defer cysto if validated UBTM is negative</div>
</div>
<div>

<div style={{ fontSize: 11 }}>• On anticoagulants/antiplatelets → same evaluation as anyone else</div>
<div style={{ fontSize: 11 }}>• Benign gynecologic or urologic causes found → still complete risk-appropriate evaluation</div>

</div>

<div>• Normal (age-adjusted): &lt;4 ng/mL for most</div>

<div>• PSA density = PSA/prostate volume</div>
<div style={{ marginTop: 4, padding: "4px 8px", background: "#fbbf2415", border: "1px solid #fbbf2430", borderRadius: 5, color: "#fbbf24", fontWeight: 600 }}>{"⚠️"} On 5-ARI (finasteride/dutasteride)? <span style={{ fontWeight: 800 }}>DOUBLE the PSA</span> — these drugs cut PSA ~50%. A PSA of 2 on finasteride = true PSA ~4.</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#ec4899" }}>When to Biopsy</div>
<div>• PSA &gt;4 or rising rapidly</div>
<div>• Abnormal DRE (nodule, hard area, asymmetry)</div>
<div>• Free/total PSA &lt;25%</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#ec4899" }}>Gleason/Grade Group (Prognosis)</div>
<div>• Grade Group 1 (GG1): 3+3 = Gleason 6</div>
<div>• Grade Group 2 (GG2): 3+4 = Gleason 7</div>
<div>• Grade Group 3 (GG3): 4+3 = Gleason 7</div>
<div>• Grade Group 4 (GG4): 4+4 = Gleason 8</div>
<div>• Grade Group 5 (GG5): 9-10 = Gleason 9-10</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#ec4899", marginBottom: 6 }}>NCCN Risk Stratification (Localized Prostate Cancer)</div>
<div style={{ background: "#4ade8010", border: "1px solid #4ade8030", borderRadius: 6, padding: "8px 10px", marginBottom: 5 }}>
<div style={{ fontWeight: 700, color: "#4ade80", marginBottom: 3 }}>VERY LOW RISK</div>
<div style={{ fontSize: 11 }}>• T1c, GG1 (Gleason 3+3), PSA &lt;10 ng/mL</div>
<div style={{ fontSize: 11 }}>• Fewer than 3 positive biopsy cores, ≤50% cancer in any core</div>
<div style={{ fontSize: 11 }}>• PSA density &lt;0.15 ng/mL/g</div>
<div style={{ fontSize: 10, color: "#4ade80", fontWeight: 600, marginTop: 3 }}>→ Active surveillance preferred (life expectancy ≥10 yr)</div>
</div>
<div style={{ background: "#4ade8010", border: "1px solid #4ade8030", borderRadius: 6, padding: "8px 10px", marginBottom: 5 }}>
<div style={{ fontWeight: 700, color: "#4ade80", marginBottom: 3 }}>LOW RISK</div>
<div style={{ fontSize: 11 }}>• T1-T2a, GG1 (Gleason 3+3), PSA &lt;10 ng/mL</div>
<div style={{ fontSize: 10, color: "#4ade80", fontWeight: 600, marginTop: 3 }}>→ Active surveillance preferred; RP or RT options</div>
</div>
<div style={{ background: "#fbbf2410", border: "1px solid #fbbf2430", borderRadius: 6, padding: "8px 10px", marginBottom: 5 }}>
<div style={{ fontWeight: 700, color: "#fbbf24", marginBottom: 3 }}>FAVORABLE INTERMEDIATE</div>
<div style={{ fontSize: 11 }}>• 1 intermediate risk factor (IRF): T2b-T2c OR GG2 (3+4) OR PSA 10-20</div>
<div style={{ fontSize: 11 }}>• Must be GG1 or GG2 (no pattern 4 predominance)</div>
<div style={{ fontSize: 11 }}>• &lt;50% positive biopsy cores</div>
<div style={{ fontSize: 10, color: "#fbbf24", fontWeight: 600, marginTop: 3 }}>→ Active surveillance, RP, or RT ± short-term ADT (4-6 mo)</div>
</div>
<div style={{ background: "#fbbf2410", border: "1px solid #fbbf2430", borderRadius: 6, padding: "8px 10px", marginBottom: 5 }}>
<div style={{ fontWeight: 700, color: "#fbbf24", marginBottom: 3 }}>UNFAVORABLE INTERMEDIATE</div>
<div style={{ fontSize: 11 }}>• GG3 (4+3), OR 2-3 IRFs, OR ≥50% positive cores</div>
<div style={{ fontSize: 10, color: "#fbbf24", fontWeight: 600, marginTop: 3 }}>→ RP (± pelvic LND) or RT + ADT (4-6 mo); not ideal for AS</div>
</div>
<div style={{ background: "#ef444410", border: "1px solid #ef444430", borderRadius: 6, padding: "8px 10px", marginBottom: 5 }}>
<div style={{ fontWeight: 700, color: "#ef4444", marginBottom: 3 }}>HIGH RISK</div>
<div style={{ fontSize: 11 }}>• T3a, OR GG4-5 (Gleason 8-10), OR PSA &gt;20 ng/mL</div>
<div style={{ fontSize: 10, color: "#ef4444", fontWeight: 600, marginTop: 3 }}>→ RP + pelvic LND, or RT + long-term ADT (18-36 mo)</div>
</div>
<div style={{ background: "#ef444410", border: "1px solid #ef444430", borderRadius: 6, padding: "8px 10px" }}>
<div style={{ fontWeight: 700, color: "#ef4444", marginBottom: 3 }}>VERY HIGH RISK</div>
<div style={{ fontSize: 11 }}>• T3b-T4 (seminal vesicle/adjacent organ invasion)</div>
<div style={{ fontSize: 11 }}>• OR primary Gleason pattern 5</div>
<div style={{ fontSize: 11 }}>• OR &gt;4 cores with GG4-5</div>
<div style={{ fontSize: 10, color: "#ef4444", fontWeight: 600, marginTop: 3 }}>→ RT + long-term ADT ± abiraterone; RP in select cases</div>
</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#ec4899" }}>Staging Quick Reference</div>
<div style={{ fontSize: 11, display: "grid", gridTemplateColumns: "auto 1fr", gap: "1px 8px", marginTop: 3 }}>
<div style={{ fontWeight: 600, color: "#94a3b8" }}>T1</div><div>Not palpable or visible (T1a incidental TURP &lt;5%, T1b &gt;5%, T1c needle bx for PSA)</div>
<div style={{ fontWeight: 600, color: "#94a3b8" }}>T2</div><div>Confined to prostate (T2a ≤half one lobe, T2b &gt;half one lobe, T2c both lobes)</div>
<div style={{ fontWeight: 600, color: "#94a3b8" }}>T3</div><div>Extends through capsule (T3a ECE, T3b seminal vesicle invasion)</div>
<div style={{ fontWeight: 600, color: "#94a3b8" }}>T4</div><div>Fixed or invades adjacent structures (bladder, rectum, pelvic wall)</div>
</div>
</div>
</div>
</div>
)}
{refCard === "torsion" && (
<div style={{ background: c.cd, border: "1px solid #334155", borderRadius: 8, padding: 16, marginBottom: 16 }}>
<div style={{ fontSize: 14, fontWeight: 700, color: c.a, marginBottom: 12 }}>Testicular Torsion</div>
<div style={{ display: "flex", flexDirection: "column", gap: 12, fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>
<div>
<div style={{ fontWeight: 600, color: "#dc2626" }}>Salvage Window</div>
<div>• &lt;6 hours = 95% salvage rate</div>
<div>• &gt;24 hours = &lt;10% salvage rate</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#dc2626" }}>Classic Findings</div>
<div>• Bell clapper deformity (tunica vaginalis completely surrounds cord)</div>
<div>• ABSENT cremasteric reflex (most sensitive finding)</div>

{refCard === "bph" && (
<div data-refcard="bph" style={{ background: c.cd, border: "1px solid #334155", borderRadius: 8, padding: 16, marginBottom: 16 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><div style={{ fontSize: 14, fontWeight: 700, color: c.a }}>BPH Medications</div><button onClick={function() { copyCardText("bph"); }} title="Copy card to clipboard" style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: 0.4, padding: 2 }} onMouseOver={function(e) { e.target.style.opacity = 1; }} onMouseOut={function(e) { e.target.style.opacity = 0.4; }}>{"📋"}</button></div>
<div style={{ fontSize: 9, color: "#64748b", marginBottom: 12 }}>Alpha blockers, 5-ARIs, combination therapy & alternatives</div>
<div style={{ display: "flex", flexDirection: "column", gap: 14, fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Alpha-1 Blockers — Uroselective (α1A)</div>
<div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 6 }}>Selective for α1A receptors in prostate smooth muscle. Less orthostatic hypotension than non-selective agents.</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Tamsulosin (Flomax)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Doses:</span> 0.4mg, 0.8mg — once daily, 30 min after same meal</div>
<div>• Most commonly prescribed alpha blocker for BPH</div>
<div>• Most selective for α1A → <span style={{ fontWeight: 600 }}>lowest orthostatic hypotension</span> of all alpha blockers</div>
<div>• Capsule — <span style={{ color: "#fbbf24", fontWeight: 600 }}>cannot be crushed/opened</span> (modified release)</div>
<div style={{ color: "#f87171" }}>• Moderate retrograde ejaculation rate (~8-18%)</div>
<div style={{ padding: "3px 8px", background: "#ef444415", border: "1px solid #ef444430", borderRadius: 4, marginTop: 4, fontSize: 10, color: "#f87171", fontWeight: 600 }}>{"⚠️"} IFIS risk — must stop 1-2 weeks before cataract surgery. Alert ophthalmology!</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Silodosin (Rapaflo)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Doses:</span> 4mg, 8mg — once daily with a meal</div>
<div>• <span style={{ fontWeight: 600 }}>Most selective α1A blocker</span> — highest uroselective ratio</div>
<div>• Very low orthostatic hypotension</div>
<div style={{ color: "#ef4444", fontWeight: 600 }}>• HIGHEST retrograde ejaculation rate (~28%) — counsel patients</div>
<div>• Capsule can be opened and sprinkled on applesauce (for patients with swallowing difficulty)</div>
<div>• Dose adjust: 4mg for moderate renal impairment, contraindicated in severe (CrCl &lt;30)</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Alfuzosin (Uroxatral)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Doses:</span> 10mg ER — once daily, immediately after same meal</div>
<div>• Uroselective in practice (though technically α1A/B/D)</div>
<div style={{ color: "#4ade80", fontWeight: 600 }}>• LOWEST retrograde ejaculation rate of all alpha blockers (~1-2%)</div>
<div>• Good choice for sexually active patients concerned about ejaculatory function</div>
<div>• <span style={{ color: "#fbbf24", fontWeight: 600 }}>Cannot be crushed</span> (extended release)</div>
<div>• Avoid with CYP3A4 inhibitors (ketoconazole, ritonavir) and hepatic impairment</div>
<div style={{ fontSize: 10, color: "#f87171" }}>• Slight QTc prolongation risk — avoid with other QT-prolonging drugs</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Alpha-1 Blockers — Non-selective (α1A/B/D)</div>
<div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 6 }}>Block α1 receptors in prostate AND vascular smooth muscle. More orthostatic hypotension — require dose titration. Also used for hypertension.</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Doxazosin (Cardura)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Doses:</span> 1mg, 2mg, 4mg, 8mg — once daily (IR); 4mg, 8mg (XL)</div>
<div>• <span style={{ fontWeight: 600 }}>Start 1mg at bedtime, titrate up weekly</span> (first-dose hypotension risk)</div>
<div style={{ color: "#4ade80", fontWeight: 600 }}>• IR tablets CAN be crushed — great for G-tubes/NG tubes or dysphagia</div>
<div>• Dual benefit: also treats hypertension (good for BPH + HTN patients)</div>
<div>• More orthostatic hypotension than uroselective agents — take at bedtime</div>
<div>• Low retrograde ejaculation rate (~3-4%)</div>
<div>• Very inexpensive / generic widely available</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Terazosin (Hytrin)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Doses:</span> 1mg, 2mg, 5mg, 10mg — once daily at bedtime</div>
<div>• <span style={{ fontWeight: 600 }}>Start 1mg at bedtime, titrate over 4-6 weeks</span> up to 10mg</div>
<div style={{ color: "#4ade80", fontWeight: 600 }}>• Tablets CAN be crushed — another option for G-tubes</div>
<div>• Also treats hypertension — original alpha blocker for BPH</div>
<div>• Most orthostatic hypotension of the group — must dose titrate slowly</div>
<div>• Low retrograde ejaculation rate (~4%)</div>
<div>• Cheapest option — pennies per pill</div>
</div>
<div style={{ padding: "6px 10px", background: "#14b8a615", border: "1px solid #14b8a630", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#14b8a6", marginBottom: 4 }}>{"📋"} Alpha Blocker Quick Compare</div>
<div style={{ fontSize: 10, display: "grid", gridTemplateColumns: "auto 1fr 1fr 1fr", gap: "2px 8px" }}>
<span style={{ fontWeight: 700, color: "#94a3b8" }}>Drug</span><span style={{ fontWeight: 700, color: "#94a3b8" }}>Retro. Ejac.</span><span style={{ fontWeight: 700, color: "#94a3b8" }}>Orthostasis</span><span style={{ fontWeight: 700, color: "#94a3b8" }}>Crushable</span>
<span style={{ color: "#e2e8f0" }}>Alfuzosin</span><span style={{ color: "#4ade80" }}>Lowest ~1%</span><span style={{ color: "#fbbf24" }}>Low-Mod</span><span style={{ color: "#ef4444" }}>No</span>
<span style={{ color: "#e2e8f0" }}>Tamsulosin</span><span style={{ color: "#fbbf24" }}>Mod ~8-18%</span><span style={{ color: "#4ade80" }}>Lowest</span><span style={{ color: "#ef4444" }}>No</span>
<span style={{ color: "#e2e8f0" }}>Doxazosin</span><span style={{ color: "#4ade80" }}>Low ~3-4%</span><span style={{ color: "#ef4444" }}>High</span><span style={{ color: "#4ade80" }}>Yes (IR)</span>
<span style={{ color: "#e2e8f0" }}>Terazosin</span><span style={{ color: "#4ade80" }}>Low ~4%</span><span style={{ color: "#ef4444" }}>Highest</span><span style={{ color: "#4ade80" }}>Yes</span>
<span style={{ color: "#e2e8f0" }}>Silodosin</span><span style={{ color: "#ef4444" }}>Highest ~28%</span><span style={{ color: "#4ade80" }}>Very Low</span><span style={{ color: "#fbbf24" }}>Open/sprinkle</span>
</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>5-Alpha Reductase Inhibitors (Shrink Prostate)</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Finasteride (Proscar)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Dose:</span> 5mg — once daily (1mg = Propecia for hair loss)</div>
<div>• Blocks type II 5α-reductase only</div>
<div>• Shrinks prostate ~20-30% over 6-12 months</div>
<div>• PSA drops ~50% — <span style={{ fontWeight: 700, color: "#fbbf24" }}>must double reported PSA</span></div>
<div>• SE: ED (~4-8%), decreased libido, gynecomastia (rare)</div>
<div>• Best for prostates &gt;30-40g</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Dutasteride (Avodart)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Dose:</span> 0.5mg — once daily</div>
<div>• Blocks type I AND type II 5α-reductase (dual inhibitor)</div>
<div>• Slightly more potent suppression of DHT than finasteride</div>
<div>• Very long half-life (~5 weeks) — effects persist long after stopping</div>
<div>• Same PSA effect — double the reported value</div>
<div>• Available as combo pill: dutasteride/tamsulosin (Jalyn) 0.5mg/0.4mg</div>
<div style={{ color: "#f87171", fontSize: 10 }}>• Pregnant women should not handle crushed/broken capsules (teratogenic — male fetal genital development)</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Combination &amp; Other Agents</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6" }}>Combination Therapy</div>
<div>• Alpha blocker + 5-ARI for prostate &gt;30g (MTOPS, CombAT trials)</div>
<div>• Reduces AUR risk and need for surgery more than monotherapy</div>
<div>• Jalyn (dutasteride 0.5mg + tamsulosin 0.4mg) — single pill combo</div>
<div>• Can trial alpha blocker alone first; add 5-ARI if prostate is large</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6" }}>Tadalafil (Cialis)</div>
<div>• <span style={{ color: "#14b8a6", fontWeight: 600 }}>Dose:</span> 5mg — once daily</div>
<div>• PDE-5 inhibitor, FDA-approved for BPH/LUTS (with or without ED)</div>
<div>• Relaxes smooth muscle via nitric oxide pathway</div>
<div>• Great dual-purpose option for patients with BPH + ED</div>
<div>• <span style={{ color: "#fbbf24", fontWeight: 600 }}>Do NOT combine with alpha blockers</span> initially (hypotension risk) — stable dose OK</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#14b8a6" }}>Anticholinergics / Beta-3 Agonists</div>
<div>• Add for persistent storage symptoms (urgency, frequency) despite alpha blocker</div>
<div>• Mirabegron (Myrbetriq) 25-50mg daily — beta-3 agonist, better SE profile</div>
<div>• Oxybutynin, tolterodine, solifenacin — anticholinergics, watch for urinary retention in high PVR patients</div>
</div>
<div style={{ padding: "6px 10px", background: "#14b8a615", border: "1px solid #14b8a630", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#14b8a6", marginBottom: 2 }}>{"📋"} Board Pearls</div>
<div style={{ fontSize: 11 }}>• Sexually active + worried about ejaculation → alfuzosin (lowest retro. ejac.)</div>
<div style={{ fontSize: 11 }}>• G-tube / can't swallow → doxazosin or terazosin (crushable), or silodosin (open &amp; sprinkle)</div>
<div style={{ fontSize: 11 }}>• BPH + hypertension → doxazosin or terazosin (treats both)</div>
<div style={{ fontSize: 11 }}>• Large prostate (&gt;30g) → add 5-ARI to alpha blocker</div>
<div style={{ fontSize: 11 }}>• On a 5-ARI? Double the PSA to get true value</div>
<div style={{ fontSize: 11 }}>• Upcoming cataract surgery → stop tamsulosin (IFIS risk)</div>
<div style={{ fontSize: 11 }}>• BPH + ED → tadalafil 5mg daily (dual purpose)</div>
</div>
</div>
</div>
)}

<div>
<div style={{ fontWeight: 600, color: "#0ea5e9" }}>TNM Staging</div>
<div>• Ta: Papillary, noninvasive</div>
<div>• Tis: Carcinoma in situ (flat, aggressive)</div>
<div>• T1: Invades lamina propria (muscle layer)</div>
<div>• T2a: Invades inner muscle</div>
<div>• T2b: Invades outer muscle</div>
<div>• T3: Invades perivesical fat</div>
<div>• T4: Invades adjacent organs (prostate, uterus, colon)</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#0ea5e9" }}>NMIBC vs MIBC</div>

</div>
<div>
<div style={{ fontWeight: 600, color: "#0ea5e9" }}>Treatment Strategy</div>
<div>• NMIBC: TURBT + intravesical BCG (Bacille Calmette-Guérin)</div>
<div>• MIBC: Radical cystoprostatectomy ± chemo (cisplatin-based)</div>

{refCard === "trials" && (

<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><div style={{ fontSize: 14, fontWeight: 700, color: c.a }}>Landmark Urology Trials</div><button onClick={function() { copyCardText("trials"); }} title="Copy card to clipboard" style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: 0.4, padding: 2 }} onMouseOver={function(e) { e.target.style.opacity = 1; }} onMouseOut={function(e) { e.target.style.opacity = 0.4; }}>{"📋"}</button></div>
<div style={{ fontSize: 9, color: "#64748b", marginBottom: 12 }}>Key studies every urologist should know</div>
<div style={{ display: "flex", flexDirection: "column", gap: 14, fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>
<div style={{ fontWeight: 600, color: "#a855f7", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Prostate Cancer</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>PIVOT (2012, 2020 update)</div>
<div style={{ fontSize: 11 }}>RP vs observation for localized PCa. No significant OS benefit with RP overall; modest benefit in intermediate-risk subgroup. Supports active surveillance for low-risk disease.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>ProtecT (2016, 2023 15-yr update)</div>
<div style={{ fontSize: 11 }}>Active monitoring vs RP vs RT for localized PCa. At 15 years: PCa mortality low across all arms (~3%). RP/RT had lower metastasis rates than monitoring. Supports shared decision-making.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>PLCO (2009, 2012 update)</div>
<div style={{ fontSize: 11 }}>PSA + DRE screening vs usual care. No mortality benefit from screening — but high contamination rate (~50% control arm got PSA). Study limitations weaken conclusions.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>ERSPC (2009, 2019 update)</div>
<div style={{ fontSize: 11 }}>European PSA screening trial. 20% relative reduction in PCa mortality with screening at 16 years. NNI 570 men, NND 18 to prevent one death. Key evidence supporting selective screening.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>STAMPEDE (2016–ongoing)</div>
<div style={{ fontSize: 11 }}>Multi-arm platform trial for advanced/metastatic PCa. Showed OS benefit for adding docetaxel and abiraterone to ADT in newly diagnosed mHSPC. Changed standard of care for metastatic disease.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>CHAARTED (2015)</div>
<div style={{ fontSize: 11 }}>ADT + docetaxel vs ADT alone for mHSPC. OS benefit of 13.6 months in high-volume disease (visceral mets or ≥4 bone mets). Established upfront chemo for high-volume mHSPC.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>LATITUDE (2017)</div>
<div style={{ fontSize: 11 }}>ADT + abiraterone vs ADT alone in high-risk mHSPC. Significant OS and rPFS benefit. Along with STAMPEDE, established early abiraterone as standard.</div>
</div>
<div style={{ fontWeight: 600, color: "#a855f7", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4, marginTop: 6 }}>Kidney Cancer</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>KEYNOTE-564 (2021, 2024 update)</div>
<div style={{ fontSize: 11 }}>Adjuvant pembrolizumab vs placebo for high-risk clear cell RCC post-nephrectomy. Significant DFS and OS benefit. First adjuvant IO with proven OS benefit in RCC.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>CheckMate 214 (2018)</div>
<div style={{ fontSize: 11 }}>Nivolumab + ipilimumab vs sunitinib for intermediate/poor risk mRCC. Superior OS and ORR with IO combo. Changed first-line treatment for mRCC.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>EORTC 30904 (2011)</div>
<div style={{ fontSize: 11 }}>Partial vs radical nephrectomy for small renal masses (≤5cm). Similar oncologic outcomes. Non-inferior survival. Supports nephron-sparing approach for small tumors.</div>
</div>
<div style={{ fontWeight: 600, color: "#a855f7", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4, marginTop: 6 }}>Bladder Cancer</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>CheckMate 274 (2021)</div>
<div style={{ fontSize: 11 }}>Adjuvant nivolumab vs placebo for high-risk MIBC post-cystectomy. Doubled DFS (median 20.8 vs 10.8 mo). Established adjuvant IO for high-risk MIBC.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>KEYNOTE-045 (2017)</div>
<div style={{ fontSize: 11 }}>Pembrolizumab vs chemo for platinum-refractory advanced urothelial cancer. OS benefit (10.3 vs 7.4 mo). FDA approval for second-line advanced urothelial cancer.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>EV-301 / EV-302 (2021/2023)</div>
<div style={{ fontSize: 11 }}>Enfortumab vedotin ± pembrolizumab for advanced urothelial cancer. EV-302 showed EV+pembro superior to chemo as FIRST-LINE (OS 31.5 vs 16.1 mo). Paradigm shift in metastatic bladder cancer.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>SWOG 8710 (2003)</div>
<div style={{ fontSize: 11 }}>Neoadjuvant MVAC + cystectomy vs cystectomy alone for MIBC. Median survival 77 vs 46 months. Established neoadjuvant cisplatin-based chemo as standard for MIBC.</div>
</div>
<div style={{ fontWeight: 600, color: "#a855f7", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4, marginTop: 6 }}>Stones / BPH / Other</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>SUSPEND (2015)</div>
<div style={{ fontSize: 11 }}>Tamsulosin vs nifedipine vs placebo for ureteral stones ≤10mm. No benefit from medical expulsive therapy vs placebo. Challenged routine MET for distal stones (debate ongoing).</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>CombAT (2010)</div>
<div style={{ fontSize: 11 }}>Dutasteride + tamsulosin vs monotherapy for BPH. Combination therapy superior for symptom reduction and risk of AUR/surgery at 4 years. Standard for large prostates (&gt;30cc).</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>MTOPS (2003)</div>
<div style={{ fontSize: 11 }}>Finasteride + doxazosin vs monotherapy vs placebo for BPH. Combination reduced clinical progression by 66%. Early evidence for combination medical therapy in BPH.</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>SORCE (2020)</div>
<div style={{ fontSize: 11 }}>Adjuvant sorafenib vs placebo after nephrectomy for RCC. No DFS or OS benefit. Concluded TKI adjuvant therapy is not effective for RCC.</div>
</div>
</div>
</div>
)}
{refCard === "pregnancy" && (
<div data-refcard="pregnancy" style={{ background: c.cd, border: "1px solid #334155", borderRadius: 8, padding: 16, marginBottom: 16 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><div style={{ fontSize: 14, fontWeight: 700, color: c.a }}>Urology in Pregnancy</div><button onClick={function() { copyCardText("pregnancy"); }} title="Copy card to clipboard" style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: 0.4, padding: 2 }} onMouseOver={function(e) { e.target.style.opacity = 1; }} onMouseOut={function(e) { e.target.style.opacity = 0.4; }}>{"📋"}</button></div>
<div style={{ fontSize: 9, color: "#64748b", marginBottom: 12 }}>UTI treatment & stone management in pregnant patients</div>
<div style={{ display: "flex", flexDirection: "column", gap: 14, fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>
<div style={{ padding: "6px 10px", background: "#f472b615", border: "1px solid #f472b630", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#f472b6", marginBottom: 2 }}>{"⚠️"} Key Principle</div>
<div style={{ fontSize: 11 }}>Asymptomatic bacteriuria MUST be treated in pregnancy (unlike general population) — 30-40% progress to pyelonephritis if untreated. Screen all pregnant patients at first prenatal visit.</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#f472b6", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>UTI Antibiotics — Safe in Pregnancy</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#4ade80" }}>{"✅"} Safe (All Trimesters)</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Nitrofurantoin</span> 100mg BID x 5-7 days — 1st line for cystitis</div>
<div style={{ fontSize: 10, color: "#94a3b8", paddingLeft: 12 }}>Avoid at term (≥36 wks) — risk of neonatal hemolytic anemia</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Cephalexin</span> 500mg QID x 3-7 days — safe throughout</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Amoxicillin</span> 500mg TID x 3-7 days — safe but rising resistance</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Amox-Clav</span> 875/125mg BID x 3-7 days</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Ceftriaxone</span> 1-2g IV — for pyelo/sepsis</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Fosfomycin</span> 3g single dose — convenient option for cystitis</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#fbbf24" }}>{"⚠️"} Use with Caution</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>TMP-SMX</span> — avoid in 1st trimester (folate antagonist → neural tube defects) and near term (kernicterus risk)</div>
<div style={{ fontSize: 10, color: "#94a3b8", paddingLeft: 12 }}>OK in 2nd trimester if no alternatives, supplement with folate</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#ef4444" }}>{"🚫"} Contraindicated</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Fluoroquinolones</span> (Cipro, Levo) — cartilage damage in fetus, tendon toxicity</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Tetracyclines</span> (Doxy) — teeth discoloration, bone growth inhibition</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Aminoglycosides</span> (Gentamicin) — ototoxicity, nephrotoxicity to fetus. Use only if life-threatening and no alternative.</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#f472b6" }}>Pyelonephritis in Pregnancy</div>
<div>• <span style={{ fontWeight: 700, color: "#fbbf24" }}>ALWAYS admit</span> — high risk of sepsis and preterm labor</div>
<div>• IV ceftriaxone 1-2g daily or IV ampicillin + gentamicin (if severe, gent risk accepted)</div>
<div>• Monitor for preterm contractions, obtain blood cultures</div>
<div>• Switch to PO when afebrile ×48h, complete 10-14 day total course</div>
<div>• Suppressive therapy for remainder of pregnancy (nitrofurantoin 100mg QHS)</div>
</div>
<div style={{ fontWeight: 600, color: "#f472b6", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4, marginTop: 6 }}>Urolithiasis in Pregnancy</div>
<div>
<div style={{ fontWeight: 600, color: "#f472b6" }}>Incidence & Presentation</div>
<div>• Occurs in ~1 in 200-1500 pregnancies, most common in 2nd-3rd trimester</div>
<div>• Physiologic hydronephrosis (especially R side) can mimic or mask stones</div>
<div>• Symptoms: flank pain, hematuria, nausea — same as non-pregnant but harder to distinguish from obstetric causes</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#f472b6" }}>Imaging Algorithm</div>
<div style={{ padding: "6px 10px", background: "#1e293b", borderRadius: 6, marginTop: 4 }}>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>1st line: Renal ultrasound</span> — no radiation, identifies hydro and some proximal/UVJ stones</div>
<div style={{ fontSize: 10, color: "#94a3b8", paddingLeft: 12 }}>Sensitivity limited (~60%) — physiologic hydro makes interpretation harder</div>
<div style={{ marginTop: 4 }}>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>2nd line: MRI (without gadolinium)</span> — no radiation, better for ureteral stones, "T2 dark" signal</div>
<div style={{ fontSize: 10, color: "#94a3b8", paddingLeft: 12 }}>Gadolinium is Category C — avoid. Non-contrast MRU is the study of choice</div>
<div style={{ marginTop: 4 }}>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>3rd line: Low-dose CT</span> — only if diagnosis unclear and management depends on it</div>
<div style={{ fontSize: 10, color: "#94a3b8", paddingLeft: 12 }}>Single CT scan radiation is low risk, but use clinical judgment. Avoid in 1st trimester if possible.</div>
</div>
<div style={{ marginTop: 4, padding: "4px 8px", background: "#ef444415", border: "1px solid #ef444430", borderRadius: 5, color: "#f87171", fontWeight: 600, fontSize: 10 }}>{"🚫"} No IV contrast (iodinated) — crosses placenta, risk to fetal thyroid</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#f472b6" }}>Management Algorithm</div>
<div style={{ padding: "6px 10px", background: "#1e293b", borderRadius: 6, marginTop: 4 }}>
<div style={{ fontWeight: 700, color: "#4ade80", marginBottom: 4 }}>Conservative First (majority pass spontaneously)</div>
<div>• IV hydration, pain control (acetaminophen 1st line)</div>
<div>• <span style={{ fontWeight: 700, color: "#fbbf24" }}>NSAIDs contraindicated</span> — premature ductus closure, oligohydramnios (especially 3rd tri)</div>
<div>• Opioids OK short-term for breakthrough pain (avoid chronic use near term)</div>
<div>• Alpha-blockers (tamsulosin) — limited safety data, but used off-label in refractory cases</div>
</div>
<div style={{ padding: "6px 10px", background: "#1e293b", borderRadius: 6, marginTop: 6 }}>
<div style={{ fontWeight: 700, color: "#fbbf24", marginBottom: 4 }}>Indications for Intervention</div>
<div>• Infected/obstructed kidney (urosepsis) — <span style={{ fontWeight: 700, color: "#ef4444" }}>EMERGENCY</span></div>
<div>• Intractable pain despite conservative management</div>
<div>• Solitary kidney with obstruction</div>
<div>• Bilateral obstruction or renal insufficiency</div>
<div>• Preterm labor triggered by stone</div>
</div>
<div style={{ padding: "6px 10px", background: "#1e293b", borderRadius: 6, marginTop: 6 }}>
<div style={{ fontWeight: 700, color: "#38bdf8", marginBottom: 4 }}>Surgical Options</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Ureteral stent (DJ stent)</span> — temporize, requires exchanges q4-6 wks due to rapid encrustation in pregnancy</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Percutaneous nephrostomy (PCN)</span> — for septic/unstable patients, quick bedside drainage</div>
<div>• <span style={{ fontWeight: 700, color: "#e2e8f0" }}>Ureteroscopy (URS)</span> — definitive treatment, safe in all trimesters per AUA. Preferred for accessible stones to avoid repeated stent exchanges</div>
<div style={{ fontSize: 10, color: "#94a3b8", paddingLeft: 12 }}>Limit fluoro, use ultrasound guidance when possible. Short GA preferred.</div>
<div style={{ marginTop: 4, color: "#ef4444", fontWeight: 600 }}>{"🚫"} SWL (shockwave lithotripsy) — ABSOLUTELY CONTRAINDICATED in pregnancy</div>
</div>
</div>
<div style={{ padding: "6px 10px", background: "#f472b615", border: "1px solid #f472b630", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#f472b6", marginBottom: 2 }}>{"📋"} Board Pearls</div>
<div style={{ fontSize: 11 }}>• Treat ASB in pregnancy (screen with urine culture at first prenatal visit)</div>
<div style={{ fontSize: 11 }}>• Physiologic R-sided hydro is normal (R &gt; L due to dextrorotated uterus + R ovarian vein)</div>
<div style={{ fontSize: 11 }}>• US first → MRU second → low-dose CT last resort</div>
<div style={{ fontSize: 11 }}>• SWL = never, URS = safe, stent = temporize</div>
<div style={{ fontSize: 11 }}>• No fluoroquinolones, no NSAIDs (especially 3rd tri), no gadolinium</div>
<div style={{ fontSize: 11 }}>• Suppressive abx after pyelo for rest of pregnancy</div>
</div>
</div>
</div>
)}
{refCard === "adt" && (
<div data-refcard="adt" style={{ background: c.cd, border: "1px solid #334155", borderRadius: 8, padding: 16, marginBottom: 16 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><div style={{ fontSize: 14, fontWeight: 700, color: c.a }}>ADT &amp; Hormonal Therapy for Prostate Cancer</div><button onClick={function() { copyCardText("adt"); }} title="Copy card to clipboard" style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: 0.4, padding: 2 }} onMouseOver={function(e) { e.target.style.opacity = 1; }} onMouseOut={function(e) { e.target.style.opacity = 0.4; }}>{"📋"}</button></div>
<div style={{ fontSize: 9, color: "#64748b", marginBottom: 12 }}>GnRH agonists/antagonists, antiandrogens, CYP17 inhibitors, steroids &amp; inpatient pearls</div>
<div style={{ display: "flex", flexDirection: "column", gap: 14, fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>
<div style={{ padding: "6px 10px", background: "#dc262615", border: "1px solid #dc262630", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#dc2626", marginBottom: 2 }}>{"🎯"} Goal of ADT</div>
<div style={{ fontSize: 11 }}>Achieve castrate testosterone level (&lt;50 ng/dL, ideally &lt;20 ng/dL). Can be surgical (bilateral orchiectomy) or medical. Testosterone drives prostate cancer growth — removing it is the backbone of advanced/metastatic PCa treatment.</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#dc2626", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>GnRH Agonists (LHRH Agonists)</div>
<div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 6 }}>Downregulate pituitary GnRH receptors → ↓ LH/FSH → ↓ testosterone. Initial testosterone FLARE for 1-2 weeks before suppression.</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Leuprolide (Lupron)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Depot:</span> 7.5mg monthly, 22.5mg q3mo, 30mg q4mo, 45mg q6mo</div>
<div>• Most commonly used GnRH agonist</div>
<div>• IM or subQ injection depending on formulation</div>
<div style={{ color: "#fbbf24", fontWeight: 600 }}>• FLARE: testosterone surges first 1-2 wks — must give antiandrogen cover (bicalutamide) for flare protection in patients with high-volume metastatic disease, cord compression risk, or ureteral obstruction</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Goserelin (Zoladex)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Doses:</span> 3.6mg monthly, 10.8mg q3mo — subQ implant in anterior abdominal wall</div>
<div>• Biodegradable implant — absorbed over time</div>
<div>• Same flare risk — need antiandrogen cover</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Triptorelin (Trelstar)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Doses:</span> 3.75mg monthly, 11.25mg q3mo, 22.5mg q6mo — IM injection</div>
<div>• Same class, same flare risk, same antiandrogen cover needed</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#dc2626", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>GnRH Antagonists</div>
<div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 6 }}>Directly block GnRH receptors → immediate LH/FSH suppression. NO testosterone flare — castrate levels in 24-72 hours.</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Degarelix (Firmagon)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Loading:</span> 240mg subQ (two 120mg injections), then 80mg monthly</div>
<div style={{ color: "#4ade80", fontWeight: 600 }}>• NO flare — ideal when you need rapid castration (cord compression, severe obstruction, impending fracture)</div>
<div>• No antiandrogen cover needed</div>
<div>• Injection site reactions common (~40%) — pain, erythema, swelling</div>
<div>• Possible cardiovascular benefit over agonists (HERO trial subanalysis)</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Relugolix (Orgovyx)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 360mg loading day 1, then 120mg PO daily</div>
<div style={{ color: "#4ade80", fontWeight: 600 }}>• ONLY oral GnRH antagonist — no injections</div>
<div>• No flare, rapid onset (castrate levels by day 4)</div>
<div>• Rapid testosterone recovery after stopping (~90 days) — useful if intermittent ADT planned</div>
<div>• HERO trial: superior sustained castration rate vs leuprolide, lower CV events (2.9% vs 6.2%)</div>
<div style={{ color: "#fbbf24", fontSize: 10 }}>• Avoid with strong CYP3A4 / P-gp inducers. Take without food or with light meal.</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#dc2626", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Androgen Receptor Blockers (Antiandrogens)</div>
<div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 6 }}>Block the androgen receptor (AR) — prevent testosterone/DHT from binding. Used alone (monotherapy) or combined with GnRH agents.</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 600, color: "#94a3b8", marginBottom: 4 }}>1st Generation (Non-steroidal)</div>
<div style={{ marginBottom: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Bicalutamide (Casodex)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 50mg PO daily (with GnRH agonist) or 150mg daily (monotherapy, not FDA-approved in US)</div>
<div>• Primary use: <span style={{ fontWeight: 600 }}>flare protection</span> — start 7 days before GnRH agonist, continue 2-4 weeks</div>
<div>• SE: gynecomastia, breast tenderness, hot flashes, hepatotoxicity (check LFTs)</div>
<div style={{ color: "#fbbf24", fontSize: 10 }}>• At high doses, can have withdrawal response — stopping bicalutamide can paradoxically lower PSA ("antiandrogen withdrawal")</div>
</div>
<div style={{ marginBottom: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Flutamide (Eulexin)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 250mg PO TID (three times daily)</div>
<div>• Older agent, rarely used now — more hepatotoxicity than bicalutamide</div>
<div>• Also causes diarrhea</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Nilutamide (Nilandron)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 300mg daily x 30 days, then 150mg daily</div>
<div>• Unique SE: visual adaptation delay (night driving difficulty), alcohol intolerance (disulfiram-like), interstitial pneumonitis</div>
<div>• Rarely used — too many side effects</div>
</div>
</div>
<div style={{ padding: "8px 10px", background: "#1e293b", borderRadius: 6 }}>
<div style={{ fontWeight: 600, color: "#94a3b8", marginBottom: 4 }}>2nd Generation (Next-Gen AR Inhibitors) — for mCRPC and mHSPC</div>
<div style={{ marginBottom: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Enzalutamide (Xtandi)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 160mg (four 40mg caps) PO daily</div>
<div>• Blocks AR binding, AR nuclear translocation, and AR-DNA binding (triple mechanism)</div>
<div>• Approved for: mCRPC (pre/post chemo), mHSPC, nmCRPC</div>
<div>• SE: fatigue (very common), seizure risk (~0.5%), cognitive effects, falls/fractures</div>
<div>• Strong CYP3A4 inducer — multiple drug interactions (warfarin, opioids, etc.)</div>
<div>• PROSPER, ARCHES, ENZAMET trials</div>
</div>
<div style={{ marginBottom: 6 }}>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Apalutamide (Erleada)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 240mg (four 60mg tabs) PO daily</div>
<div>• Same mechanism as enzalutamide, slightly different SE profile</div>
<div>• Approved for: nmCRPC, mHSPC</div>
<div>• SE: rash (~25% — can be severe), hypothyroidism, fatigue, falls/fractures</div>
<div>• SPARTAN, TITAN trials</div>
</div>
<div>
<div style={{ fontWeight: 700, color: "#e2e8f0" }}>Darolutamide (Nubeqa)</div>
<div>• <span style={{ color: "#dc2626", fontWeight: 600 }}>Dose:</span> 600mg (two 300mg tabs) PO BID with food</div>
<div>• Does NOT cross blood-brain barrier well → <span style={{ color: "#4ade80", fontWeight: 600 }}>lowest CNS side effects</span> (less fatigue, no seizure risk, fewer falls)</div>
<div>• <span style={{ color: "#4ade80", fontWeight: 600 }}>Minimal drug interactions</span> — not a strong CYP inducer/inhibitor</div>
<div>• Approved for: nmCRPC, mHSPC (ARASENS — with docetaxel + ADT)</div>
<div>• ARAMIS, ARASENS trials</div>
<div style={{ color: "#4ade80", fontSize: 10 }}>• Best tolerated 2nd-gen antiandrogen — consider for elderly or polypharmacy patients</div>
</div>
</div>
<div>
<div style={{ fontWeight: 600, color: "#dc2626", fontSize: 13, borderBottom: "1px solid #334155", paddingBottom: 4 }}>CYP17 Inhibitors (Adrenal Androgen Blockade)</div>
<div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 6 }}>Block CYP17A1 enzyme → prevents androgen synthesis in adrenals, testes, AND tumor itself. Critical because CRPC tumors make their own androgens intracrinally.</div>
</div>
